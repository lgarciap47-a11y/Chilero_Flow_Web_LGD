<body>

    <header class="header_lgd">
        <nav class="nav-menu_lgd">
            <div class="logo-container_lgd">
                <img src="logolgd.png" width="70" height="70" />
            </div>
            <ul class="nav-list_lgd">
                <li><a href="index_lgd.html">Inicio</a></li>

                <li><a href="acerca_de_lgd.html">Acerca de</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-content_lgd">
        <div class="form-container_lgd">
            <h2>Escríbenos tu Mensaje</h2>
            <p>¿Tienes dudas con las tallas o envíos en Guatemala? Mandanos un mensaje.</p>
            
            <form class="contact-form_lgd" onsubmit="event.preventDefault(); alert('¡Simulación de envío con éxito!');">
                <div class="group-field_lgd">
                    <label>Nombre Completo:</label>
                    <input type="text" placeholder="Ej. Evelyn Cardona" required>
                </div>
                <div class="group-field_lgd">
                    <label>Correo Electrónico:</label>
                    <input type="email" placeholder="intouch@correo.com" required>
                </div>
                <div class="group-field_lgd">
                    <label>Mensaje o Duda:</label>
                    <textarea rows="5" placeholder="Escribe aquí tu consulta..." required></textarea>
                </div>
                <button type="submit" class="btn-send_lgd">Enviar Consulta</button>
            </form>
        </div>
    </main>
